{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Gildemeister</title>
  <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body>
  <div class="login-container">
    <img src="{% static 'core/img/logo.png' %}" alt="Logo Gildemeister" class="logo" />
    <h2>Crear Cuenta</h2>

    {% if error %}
      <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
      {% csrf_token %}
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required>

      <label for="apellidos">Apellidos</label>
      <input type="text" id="apellidos" name="apellidos" required>

      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" placeholder="Ej: juanperez" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" placeholder="********" required>

      <button type="submit">Registrarse</button>
    </form>

    <a href="{% url 'login' %}" class="forgot">Volver al inicio de sesión</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  {% if registro_exitoso %}
  <script>
  Swal.fire({
      icon: 'success',
      title: 'Usuario creado correctamente',
      text: 'Ya puedes iniciar sesión.',
      confirmButtonText: 'Ir al login',
      confirmButtonColor: '#0033a0'
  }).then(() => {
      window.location.href = "{% url 'login' %}";
  });
  </script>
  {% endif %}
</body>
</html>
